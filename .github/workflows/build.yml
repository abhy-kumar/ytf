name: Build Portable Tauri App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: YTF-Windows
            artifact_path: src-tauri/target/x86_64-pc-windows-msvc/release/ytf.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: YTF-MacOS
            artifact_path: src-tauri/target/x86_64-apple-darwin/release/ytf
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: YTF-Linux
            artifact_path: src-tauri/target/x86_64-unknown-linux-gnu/release/ytf

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      
    - name: Install dependencies
      run: npm install
      
    - name: Build Tauri App
      run: npm run tauri build -- --target ${{ matrix.target }}
      
    - name: Upload Portable Executable
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_path }}
